<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engineering 10X — MongoDB Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #0a0a0f;
  color: #e0e0ff;
  padding: 40px 20px;
}

.container {
  max-width: 1600px;
  margin: 0 auto;
}

header {
  margin-bottom: 50px;
  text-align: center;
}

header h1 {
  font-size: 2.5rem;
  font-weight: 900;
  background: linear-gradient(120deg, #00f5ff, #8b5cf6, #ff006e);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 10px;
}

/* ========== STATS CARDS ========== */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-bottom: 40px;
}

.stat-card {
  background: rgba(0, 245, 255, 0.05);
  border: 1px solid rgba(0, 245, 255, 0.2);
  border-radius: 12px;
  padding: 25px;
  text-align: center;
  transition: all 0.3s ease;
}

.stat-card:hover {
  border-color: rgba(0, 245, 255, 0.5);
  box-shadow: 0 0 20px rgba(0, 245, 255, 0.2);
}

.stat-label {
  color: #a0a0a0;
  font-size: 0.9rem;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.stat-value {
  font-size: 2rem;
  font-weight: 900;
  color: #00f5ff;
  font-family: 'Courier New', monospace;
}

.status-badge {
  display: inline-block;
  padding: 6px 12px;
  background: #4ade80;
  color: #000;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 700;
  margin-top: 10px;
}

.status-badge.error {
  background: #ff6b6b;
}

/* ========== CHARTS ========== */
.charts-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
  gap: 30px;
  margin-bottom: 40px;
}

.chart-container {
  background: #0f0f1e;
  border: 1px solid rgba(0, 245, 255, 0.2);
  border-radius: 12px;
  padding: 25px;
  position: relative;
}

.chart-container h3 {
  color: #00f5ff;
  margin-bottom: 20px;
  font-size: 1.3rem;
}

canvas {
  max-height: 300px;
}

/* ========== TABLE ========== */
.table-container {
  background: #0f0f1e;
  border: 1px solid rgba(0, 245, 255, 0.2);
  border-radius: 12px;
  padding: 25px;
  margin-bottom: 40px;
  overflow-x: auto;
}

.table-container h3 {
  color: #00f5ff;
  margin-bottom: 20px;
  font-size: 1.3rem;
}

table {
  width: 100%;
  border-collapse: collapse;
}

th {
  padding: 12px;
  text-align: left;
  color: #00f5ff;
  font-weight: 700;
  border-bottom: 2px solid rgba(0, 245, 255, 0.3);
  font-size: 0.85rem;
  text-transform: uppercase;
}

td {
  padding: 12px;
  border-bottom: 1px solid rgba(0, 245, 255, 0.1);
  color: #e0e0ff;
}

tr:hover {
  background: rgba(0, 245, 255, 0.05);
}

.delta-badge {
  display: inline-block;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 0.85rem;
  font-weight: 600;
}

.delta-positive {
  background: rgba(74, 222, 128, 0.2);
  color: #4ade80;
}

.delta-negative {
  background: rgba(239, 68, 68, 0.2);
  color: #ef4444;
}

.delta-neutral {
  background: rgba(107, 114, 128, 0.2);
  color: #d1d5db;
}

.loading {
  text-align: center;
  padding: 40px;
  color: #a0a0ff;
}

.spinner {
  display: inline-block;
  width: 40px;
  height: 40px;
  border: 3px solid rgba(0, 245, 255, 0.2);
  border-top: 3px solid #00f5ff;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@media (max-width: 768px) {
  header h1 {
    font-size: 1.5rem;
  }

  .charts-grid {
    grid-template-columns: 1fr;
  }

  table {
    font-size: 0.9rem;
  }

  th, td {
    padding: 8px;
  }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>Engineering 10X — MongoDB Analytics</h1>
    <p>Sync History & Trends</p>
  </header>

  <!-- STATS -->
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">💾 KPI Snapshots</div>
      <div class="stat-value" id="kpi-count">-</div>
      <div class="status-badge" id="mongo-status">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">👥 Contributor Snapshots</div>
      <div class="stat-value" id="contributor-count">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">⏱️ Last Sync</div>
      <div class="stat-value" id="last-sync" style="font-size: 0.9rem;">-</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">📊 Delta Sync Enabled</div>
      <div class="stat-value" style="font-size: 1.2rem;" id="delta-status">✓</div>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="charts-grid">
    <div class="chart-container">
      <h3>⭐ Stars Trend</h3>
      <canvas id="starsChart"></canvas>
    </div>
    <div class="chart-container">
      <h3>⚡ Weekly Commits Trend</h3>
      <canvas id="commitsChart"></canvas>
    </div>
  </div>

  <!-- SYNC HISTORY TABLE -->
  <div class="table-container">
    <h3>📜 Recent Sync History (Last 20)</h3>
    <table>
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Stars</th>
          <th>Commits</th>
          <th>Contributors</th>
          <th>PR Turnaround</th>
          <th>Delta</th>
        </tr>
      </thead>
      <tbody id="sync-tbody">
        <tr>
          <td colspan="6" style="text-align: center; padding: 40px;">
            <div class="spinner" style="display: inline-block;"></div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<script>
let chartsInitialized = false;
let starsChart = null;
let commitsChart = null;

// ========== FETCH MONGO DATA ==========
async function fetchMongoData() {
  try {
    console.log('📊 Fetching MongoDB data...');

    const [statsRes, trendsRes, historyRes] = await Promise.all([
      fetch('http://localhost:3003/api/mongo/stats'),
      fetch('http://localhost:3003/api/mongo/kpi-trends'),
      fetch('http://localhost:3003/api/mongo/sync-history')
    ]);

    const stats = await statsRes.json();
    const trends = await trendsRes.json();
    const history = await historyRes.json();

    console.log('✅ Data received:', { stats, trends, history });

    displayStats(stats);
    displayTrends(trends.trends || []);
    displayHistory(history.history || []);

  } catch (error) {
    console.error('Error fetching MongoDB data:', error);
    document.getElementById('mongo-status').textContent = 'OFFLINE';
    document.getElementById('mongo-status').classList.add('error');
  }
}

// ========== DISPLAY STATS ==========
function displayStats(stats) {
  document.getElementById('kpi-count').textContent = stats.kpiSnapshots || 0;
  document.getElementById('contributor-count').textContent = stats.contributorSnapshots || 0;

  if (stats.lastSyncAt) {
    const lastSync = new Date(stats.lastSyncAt);
    document.getElementById('last-sync').textContent = lastSync.toLocaleTimeString();
  }

  const statusBadge = document.getElementById('mongo-status');
  if (stats.mongoConnected) {
    statusBadge.textContent = 'CONNECTED';
    statusBadge.classList.remove('error');
  } else {
    statusBadge.textContent = 'OFFLINE';
    statusBadge.classList.add('error');
  }
}

// ========== DISPLAY TRENDS (CHARTS) ==========
function displayTrends(trends) {
  const timestamps = trends.map(t => new Date(t.timestamp).toLocaleTimeString());
  const stars = trends.map(t => t.stars);
  const commits = trends.map(t => t.commits);

  // Stars Chart
  const starsCtx = document.getElementById('starsChart').getContext('2d');
  if (starsChart) starsChart.destroy();
  starsChart = new Chart(starsCtx, {
    type: 'line',
    data: {
      labels: timestamps,
      datasets: [{
        label: 'Stars',
        data: stars,
        borderColor: '#00f5ff',
        backgroundColor: 'rgba(0, 245, 255, 0.1)',
        tension: 0.4,
        fill: true,
        pointBackgroundColor: '#00f5ff'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend: { labels: { color: '#a0a0ff' } } },
      scales: {
        x: { ticks: { color: '#a0a0ff' }, grid: { color: 'rgba(0, 245, 255, 0.1)' } },
        y: { ticks: { color: '#a0a0ff' }, grid: { color: 'rgba(0, 245, 255, 0.1)' } }
      }
    }
  });

  // Commits Chart
  const commitsCtx = document.getElementById('commitsChart').getContext('2d');
  if (commitsChart) commitsChart.destroy();
  commitsChart = new Chart(commitsCtx, {
    type: 'bar',
    data: {
      labels: timestamps,
      datasets: [{
        label: 'Weekly Commits',
        data: commits,
        backgroundColor: 'rgba(139, 92, 246, 0.5)',
        borderColor: '#8b5cf6'
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend: { labels: { color: '#a0a0ff' } } },
      scales: {
        x: { ticks: { color: '#a0a0ff' }, grid: { color: 'rgba(0, 245, 255, 0.1)' } },
        y: { ticks: { color: '#a0a0ff' }, grid: { color: 'rgba(0, 245, 255, 0.1)' } }
      }
    }
  });
}

// ========== DISPLAY HISTORY TABLE ==========
function displayHistory(history) {
  const html = history.slice(0, 20).map(snap => {
    const delta = snap.delta || {};
    const deltaStr = Object.keys(delta).map(key => {
      const change = delta[key].change || 0;
      const sign = change > 0 ? '+' : '';
      const className = change > 0 ? 'delta-positive' : change < 0 ? 'delta-negative' : 'delta-neutral';
      return `<span class="delta-badge ${className}">${key}: ${sign}${change}</span>`;
    }).join(' ');

    const turnaroundDisplay = snap.data.avgPRTurnaround >= 1
      ? `${snap.data.avgPRTurnaround} days`
      : `${snap.data.avgPRTurnaround} hours`;

    return `
      <tr>
        <td>${new Date(snap.timestamp).toLocaleString()}</td>
        <td>${snap.data.totalStars.toLocaleString()}</td>
        <td>${snap.data.weeklyCommits}</td>
        <td>${snap.data.activeContributors}</td>
        <td>${turnaroundDisplay}</td>
        <td>${deltaStr || '<span class="delta-badge delta-neutral">No change</span>'}</td>
      </tr>
    `;
  }).join('');

  document.getElementById('sync-tbody').innerHTML = html || `
    <tr>
      <td colspan="6" style="text-align: center; padding: 40px; color: #a0a0ff;">
        No sync history yet. Run: node github-analytics.js
      </td>
    </tr>
  `;
}

// Load on page load
document.addEventListener('DOMContentLoaded', () => {
  fetchMongoData();
  // Refresh every 30 seconds
  setInterval(fetchMongoData, 30 * 1000);
});
</script>

</body>
</html>
